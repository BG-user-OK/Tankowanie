<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>Tankowanie</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css?v=2.0.0">
  <link rel="icon" href="icons/icon-192.png">
</head>
<body>
  <div class="app-shell">
    <main>
      <section class="top-row">
        <div class="result-band">
          <div>
            <span class="label">Dziś</span>
            <div class="result-value">
              <strong id="todayResultValue">--</strong>
              <span class="result-unit">l/100</span>
            </div>
            <span id="lastSheetRead" class="visually-hidden">brak danych</span>
          </div>
          <div>
            <span class="label">Poprzednie</span>
            <div class="result-value">
              <strong id="lastResultValue">--</strong>
              <span class="result-unit">l/100</span>
            </div>
          </div>
          <div>
            <span class="label" id="monthlyHeading">Średnio miesiąc</span>
            <div class="result-value">
              <strong id="monthlyAverage">--</strong>
              <span class="result-unit">l/100</span>
            </div>
            <span id="monthlyLabel" class="visually-hidden">z arkusza</span>
          </div>
        </div>

        <button id="fuelToggle" class="fuel-switch fuel-toggle" type="button" aria-label="Wybór paliwa: LPG">
          <img id="fuelToggleImage" src="grafiki/LPG.png?v=2.0.0" alt="LPG">
        </button>
      </section>

      <section class="entry-panel">
        <div class="meter-row">
          <button id="odometerButton" class="field-button" type="button" aria-label="Licznik">
            <span class="field-main" id="odometerValue">--</span>
          </button>
          <div class="distance-box" aria-label="Dystans od ostatniego tankowania">
            <strong id="distanceValue">--</strong>
            <span>km</span>
          </div>
          <button id="dateButton" class="field-button date-button" type="button" aria-label="Data tankowania">
            <span class="field-main date-value" id="dateValue">--</span>
          </button>
          <input id="refuelDate" class="native-date-input" type="date" aria-label="Data tankowania">
        </div>

        <div class="price-grid">
          <button id="priceButton" class="field-button" type="button" aria-label="Cena z dystrybutora">
            <span class="field-main" id="pumpPriceValue">--</span>
          </button>
          <button id="discountButton" class="discount-box" type="button" aria-label="Rabat">
            <small id="discountValue">-0,21</small>
            <strong id="paidPriceValue">--</strong>
          </button>
        </div>

        <div class="liter-action-row">
          <button id="litersButton" class="field-button" type="button" aria-label="Ilość paliwa">
            <span class="field-main" id="litersValue">--</span>
          </button>
          <div class="payment-action-row">
            <div class="fuel-summary" aria-label="Podsumowanie płatności">
              <div class="summary-part summary-pump">
                <span>dystr.</span>
                <strong id="pumpTotalValue">--</strong>
              </div>
              <div class="summary-part summary-discount">
                <span>rabat</span>
                <strong id="discountTotalValue">--</strong>
              </div>
              <div class="summary-part summary-paid">
                <span>płacę</span>
                <strong id="paidTotalValue">--</strong>
              </div>
            </div>
            <button id="saveButton" class="primary action-icon" type="button" aria-label="Zapisz lub wyślij" title="Wyślij do arkusza">☁↑</button>
          </div>
        </div>
      </section>

      <section class="inline-keypad" id="inlineKeypad" aria-label="Klawiatura">
        <div class="inline-keypad-grid" id="inlineKeypadGrid">
          <button type="button" data-key="1">1</button>
          <button type="button" data-key="2">2</button>
          <button type="button" data-key="3">3</button>
          <button type="button" data-key="4">4</button>
          <button type="button" data-key="5">5</button>
          <button type="button" data-key="6">6</button>
          <button type="button" data-key="7">7</button>
          <button type="button" data-key="8">8</button>
          <button type="button" data-key="9">9</button>
          <button type="button" class="utility" data-key="back">⌫/C</button>
          <button type="button" data-key="0">0</button>
          <button type="button" class="ok" data-key="ok" aria-label="Dalej">↵</button>
        </div>
      </section>

      <footer class="flota-footer" aria-label="Orlen Flota">
        <div class="sync-strip flota-status" aria-live="polite">
          <span id="onlineState">offline</span>
          <span id="syncState">brak sync</span>
          <span id="queueState">q: 0</span>
        </div>
        <img src="grafiki/Orlen-flota.jpg" alt="Orlen Flota">
        <div class="flota-actions">
          <button id="syncButton" class="action-icon" type="button" aria-label="Synchronizuj" title="Synchronizuj">⇅</button>
          <button id="refreshButton" class="action-icon" type="button" aria-label="Pobierz dane" title="Pobierz dane z arkusza">☁↓</button>
          <button class="icon-button" id="settingsToggle" type="button" aria-label="Ustawienia synchronizacji">⚙</button>
        </div>
      </footer>

      <section class="sync-working-panel" id="syncWorkingPanel" aria-live="polite" hidden>
        <div class="sync-spinner" aria-hidden="true"></div>
        <div id="syncWorkingText">Praca online...</div>
      </section>

      <section class="queue-panel" id="queuePanel">
        <div id="queueList" class="queue-list"></div>
      </section>

      <section class="settings-panel" id="settingsPanel" hidden>
        <div class="settings-row">
          <label class="settings-field settings-url" for="endpointInput">
            <span>URL</span>
            <input id="endpointInput" type="url" inputmode="url" placeholder="https://script.google.com/macros/s/.../exec">
          </label>
          <label class="settings-field settings-pin" for="pinInput">
            <span>PIN</span>
            <input id="pinInput" type="password" inputmode="numeric" autocomplete="off" placeholder="PIN">
          </label>
          <span class="settings-version" id="appVersionLabel">v2.0.0</span>
        </div>

        <div class="actions compact">
          <button id="saveSettingsButton" type="button" aria-label="Zapisz ustawienia" title="Zapisz ustawienia">Zapisz</button>
          <button id="testSettingsButton" type="button">Test</button>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <section id="receiptDialog" class="receipt-dialog" aria-live="polite" hidden>
    <div class="receipt-card">
      <strong id="receiptQuestionText">Czy wysłać skan paragonu?</strong>
      <div id="receiptDecisionActions" class="receipt-actions">
        <button id="receiptYesButton" type="button">TAK</button>
        <button id="receiptLaterButton" type="button">MOŻE PÓŹNIEJ</button>
      </div>
      <div id="receiptSourceActions" class="receipt-actions" hidden>
        <button id="receiptCameraButton" type="button">APARAT</button>
        <button id="receiptGalleryButton" type="button">GALERIA</button>
        <button id="receiptCancelButton" type="button">ANULUJ</button>
      </div>
    </div>
  </section>

  <input id="receiptCameraInput" class="visually-hidden" type="file" accept="image/*" capture="environment">
  <input id="receiptGalleryInput" class="visually-hidden" type="file" accept="image/*">

  <script src="storage.js?v=2.0.0"></script>
  <script src="keypad.js?v=2.0.0"></script>
  <script src="sync.js?v=2.0.0"></script>
  <script src="sounds.js?v=2.0.0"></script>
  <script src="app.js?v=2.0.0"></script>
</body>
</html>
